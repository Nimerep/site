name: Build and deploy peremin.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TileDown
        run: |
          curl -L https://github.com/TileDown/tile-down/releases/download/v0.6.3/tiledown-0.6.3-macos-arm64.tar.gz -o tiledown.tar.gz
          echo "4b1eb9d2f0476c574ca066f3930681c093a369feeb80496c35065d8a73a859bd  tiledown.tar.gz" | shasum -a 256 -c -
          mkdir -p "$HOME/.local/bin"
          tar -xzf tiledown.tar.gz -C "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/tiledown"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check TileDown content
        run: tiledown doctor --publish content/

      - name: Build site
        run: tiledown build-site content/ templates/peremin.html dist/

      - name: Inspect deploy output
        run: |
          test -f dist/CNAME
          test -f dist/.nojekyll
          test -f dist/robots.txt
          test -f dist/llms.txt
          test -f dist/humans.txt
          test -f dist/goran-peremin.person.schema.json
          test -d dist/assets
          test -d dist/media

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
