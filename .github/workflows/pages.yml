name: Build and deploy peremin.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install TileDown
        run: |
          git clone --depth 1 --branch v0.6.4 https://codeberg.org/TileDownHQ/tile-down.git "$RUNNER_TEMP/tile-down"
          swift build --configuration release --package-path "$RUNNER_TEMP/tile-down/Packages" --product tiledown
          mkdir -p "$HOME/.local/bin"
          cp "$RUNNER_TEMP/tile-down/Packages/.build/release/tiledown" "$HOME/.local/bin/tiledown"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check TileDown content
        run: tiledown doctor --publish content/

      - name: Build site
        run: tiledown build-site content/ templates/peremin.html dist/

      - name: Inspect deploy output
        run: |
          test -f dist/CNAME
          test -f dist/.nojekyll
          test -f dist/robots.txt
          test -f dist/llms.txt
          test -f dist/humans.txt
          test -f dist/goran-peremin.person.schema.json
          test -d dist/assets
          test -f dist/lab/hypeometar/index.html
          test -d dist/media

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1200000
